services:
  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,dynamodb
      DEBUG: "0"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      localstack:
        condition: service_healthy
    profiles: [full]

volumes:
  localstack-data:
