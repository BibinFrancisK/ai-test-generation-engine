spring:
  application:
    name: ai-test-generation-engine
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

server:
  port: 8080

testgen:
  llm:
    provider: anthropic
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:claude-haiku-4-5-20251001}
    max-tokens: 1500
