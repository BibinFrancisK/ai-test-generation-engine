spring:
  application:
    name: ai-test-generation-engine
  threads:
    virtual:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

server:
  port: 8080

testgen:
  llm:
    provider: anthropic
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:claude-haiku-4-5-20251001}
    max-tokens: 1500

aws:
  region: ${AWS_REGION:us-east-1}
  dynamodb:
    endpoint: ${AWS_DYNAMODB_ENDPOINT:}
  s3:
    endpoint: ${AWS_S3_ENDPOINT:}
    bucket-name: ${AWS_S3_BUCKET:test-generation-artifacts-dev}

github:
  api-base-url: ${GITHUB_API_BASE_URL:https://api.github.com}
  webhook:
    secret: ${GITHUB_WEBHOOK_SECRET:}
  app:
    id: ${GITHUB_APP_ID:}
    private-key: ${GITHUB_APP_PRIVATE_KEY:}
    installation-id: ${GITHUB_APP_INSTALLATION_ID:}
